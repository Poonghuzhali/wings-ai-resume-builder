{% extends 'base.html' %}
{% load static %}

{% block title %}Login - Wings AI Resume Builder{% endblock %}

{% block content %}
<div style="min-height:calc(100vh - 76px);display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#1e2e1e,#2a3f2a,#2d4a3d);padding:3rem 1rem;">
    <div style="width:100%;max-width:440px;">
        <div style="text-align:center;margin-bottom:2rem;" class="animate-on-scroll">
            <div style="width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;box-shadow:0 8px 32px rgba(90,138,106,0.3);">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
            </div>
            <h1 style="color:white;font-size:1.8rem;font-weight:700;margin-bottom:0.3rem;">Welcome Back</h1>
            <p style="color:var(--sage-light);font-size:0.95rem;">Login to manage your resumes</p>
        </div>

        <div class="card animate-on-scroll animate-delay-1" style="border:none;box-shadow:var(--shadow-2xl);">
            <div class="card-body" style="padding:2rem;">
                <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Username *</label>
                        <input type="text" name="username" placeholder="Enter your username" value="{{ form_data.username|default:'' }}" required autofocus>
                    </div>
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem;">
                        <input type="checkbox" name="remember" id="remember" style="width:auto;" checked>
                        <label for="remember" style="text-transform:none;font-size:0.85rem;color:var(--gray-600);cursor:pointer;margin:0;">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
                        Login
                    </button>
                </form>
                <p style="text-align:center;margin-top:1.5rem;font-size:0.88rem;color:var(--gray-500);">
                    Don't have an account? <a href="{% url 'register' %}" style="color:var(--primary);font-weight:600;text-decoration:none;">Register Free</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
