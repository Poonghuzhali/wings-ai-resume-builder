{% extends 'base.html' %}
{% load static %}

{% block title %}Register - Wings AI Resume Builder{% endblock %}

{% block content %}
<div style="min-height:calc(100vh - 76px);display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#1e2e1e,#2a3f2a,#2d4a3d);padding:3rem 1rem;">
    <div style="width:100%;max-width:480px;">
        <div style="text-align:center;margin-bottom:2rem;" class="animate-on-scroll">
            <div style="width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;box-shadow:0 8px 32px rgba(90,138,106,0.3);">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
            </div>
            <h1 style="color:white;font-size:1.8rem;font-weight:700;margin-bottom:0.3rem;">Join Wings AI</h1>
            <p style="color:var(--sage-light);font-size:0.95rem;">Create your free account and start building</p>
        </div>

        <div class="card animate-on-scroll animate-delay-1" style="border:none;box-shadow:var(--shadow-2xl);">
            <div class="card-body" style="padding:2rem;">
                <form method="post" action="{% url 'register' %}">
                    {% csrf_token %}
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name *</label>
                            <input type="text" name="first_name" placeholder="John" value="{{ form_data.first_name|default:'' }}" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" name="last_name" placeholder="Doe" value="{{ form_data.last_name|default:'' }}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Username *</label>
                        <input type="text" name="username" placeholder="johndoe" value="{{ form_data.username|default:'' }}" required minlength="3">
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" name="email" placeholder="john@example.com" value="{{ form_data.email|default:'' }}" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Password *</label>
                            <input type="password" name="password" placeholder="Min 8 characters" required minlength="8">
                        </div>
                        <div class="form-group">
                            <label>Confirm Password *</label>
                            <input type="password" name="password2" placeholder="Repeat password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:0.5rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                        Create Free Account
                    </button>
                </form>
                <p style="text-align:center;margin-top:1.5rem;font-size:0.88rem;color:var(--gray-500);">
                    Already have an account? <a href="{% url 'login' %}" style="color:var(--primary);font-weight:600;text-decoration:none;">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
